# fly.toml app configuration file generated for prs-system on 2026-05-12T17:20:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'prs-system'
primary_region = 'nrt'       # 东京（中国大陆最快的可用区）。可选：sin 新加坡、lax 美西

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/app/data'
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'prs_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
