  function renameTable(id){
    const t = state.byId.get(String(id));
    if (!t) return;
    const name = prompt('重命名表格：', t.name);
    if (name && name.trim() && name.trim() !== t.name) {
      update(() => { t.name = name.trim(); });
    }
  }

  function deleteTable(id){
    if (state.tables.length <= 1) { alert('至少保留一个表格'); return; }
    const t = state.byId.get(String(id));
    if (!t) return;
    if (!confirm('删除表格「' + t.name + '」？此操作不可撤销。')) return;
    const tName = t.name;
    update(ts => {
      const idx = ts.findIndex(x => x.id === id);
      if (idx >= 0) ts.splice(idx, 1);
    });
    save(); // immediate save — don't rely on debounce
    logOp('delete_table', id, tName, '');
  }

  const COLORS = [["c-red","红","#ef4444"],["c-blue","蓝","#3b82f6"],["c-green","绿","#22c55e"],["c-amber","橙","#f59e0b"],["c-purple","紫","#8b5cf6"]];

  function showColorChange(tableId, anchorEl){
    const t = state.byId.get(String(tableId));
    if (!t) return;
    const existing = document.getElementById('tbl-color-pop');
    if (existing) { existing.remove(); return; }
    const pop = document.createElement('div');
    pop.id = 'tbl-color-pop';
    pop.style.cssText = 'position:fixed;background:#fff;border:1px solid #e2ddd8;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:9999;padding:12px;min-width:180px';
    const rect = anchorEl.getBoundingClientRect();
    pop.style.left = rect.left + 'px';
    pop.style.top = (rect.bottom + 4) + 'px';
    let h = '<div style="font-size:11px;font-weight:700;color:#6b6760;margin-bottom:8px">修改标签颜色</div><div style="display:flex;gap:8px;flex-wrap:wrap">';
    for (const c of COLORS) {
      h += '<div class="tbl-cc-dot" data-color="' + c[0] + '" title="' + c[1] + '" style="width:28px;height:28px;border-radius:6px;background:' + c[2] + ';cursor:pointer;border:2px solid ' + (t.color === c[0] ? '#1a1916' : 'transparent') + ';transition:all .12s"></div>';
    }
    h += '</div>';
    pop.innerHTML = h;
    document.body.appendChild(pop);
    pop.addEventListener('click', ev => {
      const dot = ev.target.closest('.tbl-cc-dot');
      if (!dot) return;
      update(() => { t.color = dot.getAttribute('data-color'); });
      pop.remove();
    });
    setTimeout(() => {
      const close = (ev) => {
        if (!pop.contains(ev.target)) { pop.remove(); document.removeEventListener('click', close); }
      };
      document.addEventListener('click', close);
    }, 0);
  }

  // ─────────────────────────────────────────────────────────
  //  VIEWER POSTMESSAGE SYNC
  // ─────────────────────────────────────────────────────────
  window.addEventListener('message', e => {
    if (!e.data) return;
    // Viewer data sync
    if (e.data.type === 'prs_update') {
      const { tableId, sheets } = e.data;
      if (!tableId || !sheets) return;
      update(() => {
        const t = state.byId.get(String(tableId));
        if (t) t.sheets = sheets;
      });
    }
    // Viewer operation log — every edit logged individually with old→new value
    if (e.data.type === 'prs_op_log') {
      const { tableId, opType, detail } = e.data;
      const t = state.byId.get(String(tableId));
      logOp(opType, tableId, t ? t.name : '', detail);
    }
  });

  // ─────────────────────────────────────────────────────────
  //  LOGS VIEW
  // ─────────────────────────────────────────────────────────
  const OP_LABELS = {import_table:'导入表格',delete_table:'删除表格',edit_cell:'编辑单元格',add_row:'新增行',delete_row:'删除行',add_column:'新增列',delete_column:'删除列'};
  const OP_BADGE  = {import_table:'imp',delete_table:'del',edit_cell:'edit',add_row:'add',delete_row:'del',add_column:'col',delete_column:'col'};
  let _logOffset = 0;

  window.downloadBackup = async function(){
    if(!_auth) return;
    try {
      const res = await fetch('/api/backup', {headers: authHeaders()});
      if(!res.ok){ alert('下载失败'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'prs-backup-' + new Date().toISOString().slice(0,10) + '.db';
      a.click();
      URL.revokeObjectURL(url);
    } catch(e){ alert('下载失败：' + e.message); }
  };

  function populateLogTableSelect(){
    const sel = document.getElementById('log-table-sel');
    let h = '<option value="">全部表格</option>';
    state.tables.forEach(t => { h += '<option value="'+t.id+'">'+escH(t.name)+'</option>'; });
    sel.innerHTML = h;
  }

  async function renderLogs(reset){
    if(reset) _logOffset = 0;
    const tableId = document.getElementById('log-table-sel').value;
    const body = document.getElementById('log-body');
    if(!_auth){ body.innerHTML = '<div class="dash-empty">请先登录</div>'; return; }
    try{
      const res = await fetch('/api/logs?tableId='+encodeURIComponent(tableId)+'&limit=50&offset='+_logOffset, {headers:authHeaders()});
      if(!res.ok){ body.innerHTML = '<div class="dash-empty">加载失败</div>'; return; }
      const {logs, total} = await res.json();
      document.getElementById('log-count').textContent = '共 '+total+' 条记录';
      if(!logs.length && _logOffset===0){ body.innerHTML = '<div class="dash-empty">暂无操作记录</div>'; return; }
      let h = '<table class="log-table"><thead><tr><th>时间</th><th>用户</th><th>操作</th><th>表格</th><th>详情</th></tr></thead><tbody>';
      logs.forEach(l => {
        const badge = OP_BADGE[l.op_type] || 'edit';
        h += '<tr><td class="log-time">'+escH(l.created)+'</td>'
          +'<td class="log-user">'+escH(l.username)+'</td>'
          +'<td><span class="log-badge '+badge+'">'+(OP_LABELS[l.op_type]||l.op_type)+'</span></td>'
          +'<td>'+escH(l.table_name)+'</td>'
          +'<td>'+escH(l.detail)+'</td></tr>';
      });
      h += '</tbody></table>';
      if(_logOffset + logs.length < total){
        h += '<div class="log-more"><button class="btn" onclick="_logOffset+=50;renderLogs(false)">加载更多</button></div>';
      }
      body.innerHTML = h;
    } catch(e){ body.innerHTML = '<div class="dash-empty">网络错误</div>'; }
  }

  // ─────────────────────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────────────────────
  loadAuth();
  if (_auth) {
    fetch('/api/me', {headers: authHeaders()})
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => { _auth.user = d.user; saveAuth(_auth); startApp(); })
      .catch(() => { clearAuth(); document.getElementById('auth-screen').style.display = 'flex'; document.querySelector('.shell').style.display = 'none'; });
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.querySelector('.shell').style.display = 'none';
  }

  // Exposed for developer console / legacy (no longer needed by UI)
  function setRankLimit(n) {
    state.ui.kw.rankLimit = parseInt(n, 10) || 20;
    renderKw();
  }
  window.__prs = { state, bus, update, openTable, switchView, setRankLimit };
})();
</script>
</body>
</html>
